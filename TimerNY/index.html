<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/timer.css">
  <script src="./js/timer.js" type="module"></script>
  <title>Сколько осталось до Нового Года</title>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <h1>До Нового Года осталось:</h1>
      <div class="countdown__timer">
        <div class="timer">
          <h2 id="day">00</h2>
          <p>Дней</p>
        </div>
        <div class="timer">
          <h2 id="hrs">00</h2>
          <p>Часов</p>
        </div>
        <div class="timer">
          <h2 id="min">00</h2>
          <p>Минут</p>
        </div>
        <div class="timer">
          <h2 id="sec">00</h2>
          <p>Секунд</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Практика по таймерам обратного отсчета js -->
</body>
</html>
