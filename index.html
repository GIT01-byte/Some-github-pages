<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./scripts/button_scripts.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <title>Изучения отдельных тем HTML, CSS</title>
</head>
<body>
    <style>
        @font-face {
            font-family: 'Science Gothic';
            src: local('Science Gothic'), url(../fonts/ScienceGothic-Regular.woff2) format("woff2");
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Stalinist One';
            src: local('Stalinist One'), local('Stalinist One Regular'), url(../fonts/StalinistOne-Regular.woff2) format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        html {
            font-family: 'Science Gothic' monospace;
        }

        body * {
            box-sizing: border-box;
        }

        .card {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            max-width: 400px;
            border: 2px solid;
            border-radius: 20px;
            overflow: auto;
            box-shadow: 8px 10px 10px yellow;
            background: linear-gradient(135deg, rgb(254, 172, 94) 5%, rgb(199, 121, 208) 50%, rgb(75, 192, 200) 95%);
        }

        .img {
            width: 100%;
        }

        p {
            text-shadow: 3px 5px 5px yellow;
        }

        .button {
            transition: box-shadow 2s;
            background: linear-gradient(135deg, rgb(254, 172, 94) 5%, rgb(199, 121, 208) 50%, rgb(75, 192, 200) 95%);
            border-radius: 20px;
            padding: 10px;
        }

        .button:hover {
            box-shadow: 3px 5px 5px violet;
    }
    </style>
    <article class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSvB3Zix39A8D4WfjXrU05At5mew17_Nj0lWw&s" alt="Img of cat" class="img">
        <div class="content">
            <h2>Заголовок</h2>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Deleniti cupiditate iure fuga architecto ducimus similique velit dicta recusandae necessitatibus quos accusamus earum at et dolor blanditiis, repellendus, sit eligendi placeat?</p>
        </div>
        <button class="button">КНОПКА</button>
    </article>
</body>
</html>
